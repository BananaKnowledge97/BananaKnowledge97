android {
    namespace 'com.app.mysite.bananaknowledge97'
    compileSdk 36
    
    Properties localProperties = new Properties()
    File localPropertiesFile = rootProject.file('local.properties')
    if (localPropertiesFile.exists()) {
        localProperties.load(new FileInputStream(localPropertiesFile))
    }

    signingConfigs {
        release {
            storeFile file("signing-key.jks")
            // 2. Use the variables from the file
            storePassword localProperties.getProperty('RELEASE_STORE_PASSWORD')
            keyAlias localProperties.getProperty('RELEASE_KEY_ALIAS')
            keyPassword localProperties.getProperty('RELEASE_KEY_PASSWORD')
        }
    }

    defaultConfig {
        applicationId 'com.app.mysite.bananaknowledge97'
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "1.99"

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
    }

    buildFeatures {
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlin {
        compilerOptions {
            jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
        }
    }
    // specify the signingConfig to use for release build type
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
                    }
  }  

dependencies {
    implementation libs.androidx.core.ktx
    implementation libs.androidx.appcompat
    implementation libs.material
    implementation libs.androidx.constraintlayout
    implementation(libs.androidx.core.splashscreen)
    implementation("androidx.browser:browser:1.10.0")
}
